<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkScale | Login</title>

    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <div class="login-container">

        <img src="./imagens/logo-workscale.png"
             alt="Logo WorkScale"
             class="logo">

        <h1>Login</h1>

        <p class="subtitulo">
            Entre para acessar sua conta.
        </p>

        <form id="loginForm">

            <div class="campo">
                <label for="usuario">Usuário</label>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Digite seu usuário"
                    required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required>
            </div>

            <div class="opcoes">
                <a href="alterarSenha.html">
                    Esqueci minha senha
                </a>
            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

        <p class="cadastro-link">
            Não possui conta?
            <a href="cadastroLog.html">Cadastre-se</a>
        </p>

    </div>

    <script src="./js/login.js"></script>

</body>
</html>
