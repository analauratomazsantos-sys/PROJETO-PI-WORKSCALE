<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkScale | Cadastro</title>

    <link rel="stylesheet" href="./css/cadastrolog.css">
</head>

<body>

    <div class="cadastro-container">

        <img src="./imagens/logo-workscale.png"
             alt="Logo WorkScale"
             class="logo">

        <h1>Criar Conta</h1>

        <p class="subtitulo">
            Cadastre-se para acessar o sistema WorkScale.
        </p>

        <form id="cadastroForm">

            <div class="campo">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">
            </div>

            <div class="campo">
                <label>Usuário</label>
                <input type="text" id="usuario" placeholder="Crie um usuário">
            </div>

            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha">
            </div>

            <div class="campo">
                <label>Confirmar Senha</label>
                <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
            </div>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <p class="login-link">
            Já possui conta?
            <a href="login.html">Entrar</a>
        </p>

    </div>

    <script src="./js/cadastrolog.js"></script>

</body>
</html>
